# cloudbuild.yaml
steps:
  # 1. Instalar dependencias de todo el monorepo
  - name: 'gcr.io/cloud-builders/npm'
    id: 'Install dependencies'
    args: ['install']

  # 2. Ejecutar análisis de código (Lint) en el frontend
  - name: 'gcr.io/cloud-builders/npm'
    id: 'Lint Frontend'
    args: ['run', 'lint', '--workspace=frontend']
    waitFor: ['Install dependencies']

  # 3. Ejecutar análisis de código (Lint) en el backend
  - name: 'gcr.io/cloud-builders/npm'
    id: 'Lint Backend'
    args: ['run', 'lint', '--workspace=backend']
    waitFor: ['Install dependencies']
    
  # (Opcional) Aquí iría un paso para ejecutar pruebas unitarias/integración
  # - name: 'gcr.io/cloud-builders/npm'
  #   id: 'Run tests'
  #   args: ['run', 'test', '--workspaces']
  #   waitFor: ['Install dependencies']

  # 4. Construir la imagen de Docker
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Docker image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infonavit-poc:$SHORT_SHA'
      - '.'
    waitFor: ['Lint Frontend', 'Lint Backend']

  # 5. Publicar la imagen en Google Container Registry (GCR)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Docker image'
    args: ['push', 'gcr.io/$PROJECT_ID/infonavit-poc:$SHORT_SHA']
    waitFor: ['Build Docker image']

  # 6. Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infonavit-poc-service' # Nombre de tu servicio en Cloud Run
      - '--image=gcr.io/$PROJECT_ID/infonavit-poc:$SHORT_SHA'
      - '--region=us-central1' # Cambia a tu región
      - '--platform=managed'
      - '--allow-unauthenticated' # Opcional: permite acceso público
      # Para pasar variables de entorno (ej. de Auth0) usa --set-env-vars
      # - '--set-env-vars=AUTH0_AUDIENCE=tu-audiencia,AUTH0_DOMAIN=tu-dominio'
    waitFor: ['Push Docker image']

# Almacenar la imagen construida
images:
  - 'gcr.io/$PROJECT_ID/infonavit-poc:$SHORT_SHA'
